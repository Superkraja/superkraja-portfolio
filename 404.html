<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404, Page not found | Kraja</title>
<meta name="description" content="Even superheroes get lost sometimes. The page you're looking for doesn't exist." />
<meta name="robots" content="noindex, follow" />
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Patrick+Hand+SC&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F7F8;
    --ink:#212527;
    --ink-soft:#4d4d4d;
    --muted:#9d9d9d;
    --blue:#0569E7;
    --orange:#F16040;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Figtree',system-ui,sans-serif;
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    line-height:1.4;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 24px;
    position:relative;
    overflow:hidden;
  }

  /* faint floating doodles in the background */
  .bg-doodle{
    position:absolute;opacity:.06;pointer-events:none;
    font-family:'Patrick Hand SC';font-size:200px;color:var(--ink);
    user-select:none;
  }
  .bg-doodle.tl{top:-30px;left:-10px;transform:rotate(-8deg)}
  .bg-doodle.br{bottom:-60px;right:-10px;transform:rotate(6deg);font-size:280px}

  .stage{
    max-width:560px;width:100%;
    display:flex;flex-direction:column;align-items:center;text-align:center;
    position:relative;z-index:1;
  }

  .avatar-wrap{
    position:relative;
    width:clamp(180px,45vw,260px);height:clamp(180px,45vw,260px);
    margin-bottom:24px;
    animation:float 5s ease-in-out infinite;
  }
  .avatar-wrap img{
    width:100%;height:100%;object-fit:contain;
    filter:drop-shadow(0 18px 30px rgba(34,75,86,.22));
  }
  /* big "404" floating behind the avatar */
  .four-o-four{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'Figtree',sans-serif;font-weight:800;
    font-size:clamp(160px,30vw,220px);
    letter-spacing:-0.06em;line-height:1;
    color:var(--blue);opacity:.10;
    z-index:-1;pointer-events:none;
  }
  @keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-10px)}
  }

  .eyebrow{
    font-family:'Patrick Hand SC',cursive;
    font-size:clamp(22px,3vw,28px);
    color:var(--orange);
    margin-bottom:6px;
    letter-spacing:0.01em;
  }
  h1{
    font-family:'Figtree',sans-serif;
    font-weight:800;letter-spacing:-0.03em;
    font-size:clamp(40px,6vw,64px);
    line-height:.95;
    margin:0 0 18px;
    text-wrap:balance;
  }
  .lede{
    font-size:clamp(16px,1.6vw,19px);
    color:var(--ink-soft);
    line-height:1.55;
    max-width:440px;
    margin:0 auto 32px;
    text-wrap:pretty;
  }
  .lede em{
    color:var(--ink);font-style:normal;font-weight:600;
  }

  .cta-row{
    display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  }
  .cta{
    display:inline-flex;align-items:center;gap:10px;
    padding:14px 24px;border-radius:999px;
    background:var(--ink);color:#fff;font-weight:600;font-size:15px;
    text-decoration:none;border:none;cursor:pointer;
    transition:transform .2s cubic-bezier(.2,.8,.2,1),background .2s;
  }
  .cta:hover{transform:translateY(-2px);background:#0a0d0f}
  .cta.outline{
    background:transparent;color:var(--ink);
    border:1.5px solid var(--ink);
  }
  .cta.outline:hover{background:var(--ink);color:#fff}
  .cta .arrow{display:inline-block;transition:transform .25s}
  .cta:hover .arrow{transform:translateX(4px)}
  .cta.outline:hover .arrow{transform:translateX(-4px)}

  footer{
    margin-top:48px;
    color:var(--muted);font-size:13px;
    text-align:center;
  }
</style>
</head>
<body>

<span class="bg-doodle tl">oops!</span>
<span class="bg-doodle br">?!</span>

<div class="stage">
  <div class="avatar-wrap">
    <div class="four-o-four">404</div>
    <img src="assets/kraja-superhero-avatar.png" alt="Cartoon avatar of Vladimir 'Kraja' Krajišnik dressed as Superman, looking embarrassed" />
  </div>

  <div class="eyebrow">My bad...</div>
  <h1>Even superheroes<br />get lost sometimes.</h1>
  <p class="lede">
    The page you're looking for doesn't exist, has been moved, or maybe never
    existed in the first place. <em>SUPER weird, I know.</em>
  </p>

  <div class="cta-row">
    <a class="cta" href="/">
      <span class="arrow">←</span> Back to home
    </a>
    <a class="cta outline" href="mailto:superkraja@gmail.com">
      Tell me what's broken
    </a>
  </div>
</div>

<footer>
  © <span id="y"></span> Vladimir "Kraja" Krajišnik, Product Designer.
</footer>
<script>document.getElementById('y').textContent = new Date().getFullYear();</script>

</body>
</html>
